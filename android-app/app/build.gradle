plugins {
    id 'com.android.application'
}

android {
    namespace 'org.zero.qes'
    compileSdk 35

    defaultConfig {
        applicationId 'org.zero.qes'
        minSdk 26
        targetSdk 35
        versionCode 1
        versionName '0.9-native-starter'
        ndk {
            abiFilters 'arm64-v8a'
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }
}
